<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snake</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#111;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;font-family:sans-serif;color:#fff;gap:12px}
canvas{border:2px solid #333;border-radius:6px;display:block}
#info{display:flex;gap:16px;font-size:1rem}
#info span{background:#1a1a2e;padding:4px 14px;border-radius:20px;border:1px solid #333}
#msg{display:flex;flex-direction:column;align-items:center;gap:10px;padding:10px}
#msg h2{font-size:1.6rem;color:#6f6}
#msg p{color:#aaa;font-size:.9rem}
#msg button,#dpad button{background:#1a3a1a;color:#6f6;border:2px solid #4a4;border-radius:24px;padding:8px 28px;font-size:1rem;cursor:pointer}
#dpad{display:none;user-select:none}
#dpad .drow{display:flex;justify-content:center;gap:6px;margin:3px 0}
#dpad button{padding:0;width:58px;height:58px;font-size:1.4rem;border-radius:10px}
@media(max-width:600px){#dpad{display:block}}
</style>
</head>
<body>
<h1 style="font-size:1.8rem;letter-spacing:4px;color:#a0f0a0;text-shadow:0 0 10px #0f0">🐍 SNAKE</h1>
<div id="info">
  <span>Skóre: <b id="sc">0</b></span>
  <span>Nejlepší: <b id="be">0</b></span>
</div>

<div id="msg">
  <h2 id="mt">🐍 SNAKE</h2>
  <p id="ms">Stiskni Enter nebo klikni pro start</p>
  <button onclick="startGame()">▶ Hrát</button>
</div>

<canvas id="c" style="display:none"></canvas>

<p style="font-size:0.75rem;color:#444;text-align:center">Šipky / WASD · Mezerník = restart</p>
<div id="dpad">
  <div class="drow"><button onclick="tryDir(0,-1)">▲</button></div>
  <div class="drow">
    <button onclick="tryDir(-1,0)">◀</button>
    <button onclick="tryDir(0,1)">▼</button>
    <button onclick="tryDir(1,0)">▶</button>
  </div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const N = 20;
const SZ = Math.min(window.innerWidth - 20, 400);
canvas.width = canvas.height = SZ;
const CS = SZ / N;

const COLS = ['#ff4444','#ff8844','#ffdd44','#88ff44','#44ffdd','#44aaff','#8844ff','#ff44dd'];

let snake, vx, vy, nvx, nvy, foods, walls, teles, score, best=0, running=false, timer, particles=[];

function r(n){ return Math.floor(Math.random()*n); }

function isFree(x,y){
  if(x<0||x>=N||y<0||y>=N) return false;
  if(snake.find(s=>s.x===x&&s.y===y)) return false;
  if(walls.find(w=>w.x===x&&w.y===y)) return false;
  if(foods.find(f=>f.x===x&&f.y===y)) return false;
  if(teles.find(t=>t.ax===x&&t.ay===y||t.bx===x&&t.by===y)) return false;
  return true;
}

function pick(){
  for(let i=0;i<1000;i++){
    const x=r(N),y=r(N);
    if(isFree(x,y)) return {x,y};
  }
  return null;
}

function spawnFood(bonus){
  const p=pick();
  if(p) foods.push({...p,bonus:!!bonus,c:bonus?null:COLS[r(COLS.length)]});
}

function syncFoods(){
  const need=2+Math.floor(score/10)*2;
  while(foods.filter(f=>!f.bonus).length<need) spawnFood(false);
  if(!foods.find(f=>f.bonus)) spawnFood(true);
}

function spawnWall(){
  const p=pick(); if(p) walls.push(p);
}

function spawnTele(){
  const a=pick(); if(!a) return;
  walls.push(a);
  const b=pick();
  walls.pop();
  if(!b) return;
  teles.push({ax:a.x,ay:a.y,bx:b.x,by:b.y,c:COLS[r(COLS.length)]});
}

function syncTeles(){
  const need=Math.floor(score/5);
  while(teles.length<need) spawnTele();
}

function startGame(){
  clearTimeout(timer);
  snake=[{x:10,y:10},{x:9,y:10},{x:8,y:10}];
  vx=1;vy=0;nvx=1;nvy=0;
  score=0;foods=[];walls=[];teles=[];particles=[];
  document.getElementById('sc').textContent=0;
  document.getElementById('msg').style.display='none';
  canvas.style.display='block';
  syncFoods();
  spawnWall();spawnWall();spawnWall();
  running=true;
  loop();
}

function loop(){
  if(!running) return;
  vx=nvx; vy=nvy;
  let nx=snake[0].x+vx, ny=snake[0].y+vy;

  if(nx<0||nx>=N||ny<0||ny>=N||
     snake.find(s=>s.x===nx&&s.y===ny)||
     walls.find(w=>w.x===nx&&w.y===ny)){
    endGame(); return;
  }

  const tp=teles.find(t=>t.ax===nx&&t.ay===ny||t.bx===nx&&t.by===ny);
  if(tp){
    if(tp.ax===nx&&tp.ay===ny){nx=tp.bx;ny=tp.by;}
    else{nx=tp.ax;ny=tp.ay;}
    if(snake.find(s=>s.x===nx&&s.y===ny)||walls.find(w=>w.x===nx&&w.y===ny)){
      endGame(); return;
    }
  }

  snake.unshift({x:nx,y:ny});

  const fi=foods.findIndex(f=>f.x===nx&&f.y===ny);
  if(fi>=0){
    const gain=foods[fi].bonus?3:1;
    foods.splice(fi,1);
    score+=gain;
    if(score>best){ best=score; document.getElementById('be').textContent=best; }
    document.getElementById('sc').textContent=score;
    const px=nx*CS+CS/2, py=ny*CS+CS/2;
    for(let i=0;i<20;i++){
      const a=Math.random()*Math.PI*2, spd=2+Math.random()*5;
      particles.push({x:px,y:py,vx:Math.cos(a)*spd,vy:Math.sin(a)*spd,life:1,color:COLS[r(COLS.length)]});
    }
    for(let i=0;i<gain;i++) spawnWall();
    syncFoods();
    syncTeles();
  } else {
    snake.pop();
  }

  draw();
  timer=setTimeout(loop,Math.max(50,200-score*5));
}

function endGame(){
  running=false;
  draw();
  canvas.style.display='none';
  document.getElementById('mt').textContent='💀 Konec!';
  document.getElementById('mt').style.color='#f55';
  document.getElementById('ms').textContent='Skóre: '+score+(score===best&&score>0?' 🏆 Rekord!':'');
  document.querySelector('#msg button').textContent='🔄 Hrát znovu';
  document.getElementById('msg').style.display='flex';
}

function tryDir(x,y){
  if(!running){startGame();return;}
  if(x===-vx&&y===-vy) return;
  nvx=x;nvy=y;
}

function draw(){
  const now=Date.now();
  ctx.clearRect(0,0,SZ,SZ);
  ctx.fillStyle='#111';
  ctx.fillRect(0,0,SZ,SZ);

  // Mřížka
  ctx.strokeStyle='#1a1a1a';ctx.lineWidth=0.5;
  for(let i=0;i<=N;i++){
    ctx.beginPath();ctx.moveTo(i*CS,0);ctx.lineTo(i*CS,SZ);ctx.stroke();
    ctx.beginPath();ctx.moveTo(0,i*CS);ctx.lineTo(SZ,i*CS);ctx.stroke();
  }

  // Teleporty
  teles.forEach(tp=>{
    const pulse=0.8+0.2*Math.abs(Math.sin(now/300));
    [{x:tp.ax,y:tp.ay,l:'A'},{x:tp.bx,y:tp.by,l:'B'}].forEach(({x,y,l})=>{
      const cx=x*CS+CS/2, cy=y*CS+CS/2, rad=CS/2*0.82*pulse;
      ctx.save();
      ctx.shadowColor=tp.c; ctx.shadowBlur=20;
      ctx.strokeStyle=tp.c; ctx.lineWidth=2.5;
      ctx.beginPath();ctx.arc(cx,cy,rad,0,Math.PI*2);ctx.stroke();
      ctx.globalAlpha=0.2; ctx.fillStyle=tp.c;
      ctx.beginPath();ctx.arc(cx,cy,rad,0,Math.PI*2);ctx.fill();
      ctx.globalAlpha=1; ctx.shadowBlur=0;
      ctx.fillStyle='#fff';
      ctx.font='bold '+Math.round(CS*0.36)+'px monospace';
      ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText(l,cx,cy);
      ctx.restore();
    });
  });

  // Zdi
  walls.forEach(w=>{
    ctx.save();
    ctx.shadowColor='#ff3300'; ctx.shadowBlur=10;
    ctx.fillStyle='#aa1100';
    ctx.fillRect(w.x*CS+2,w.y*CS+2,CS-4,CS-4);
    ctx.shadowBlur=0;
    ctx.strokeStyle='#ff5533'; ctx.lineWidth=1.5;
    ctx.beginPath();
    ctx.moveTo(w.x*CS+5,w.y*CS+5);ctx.lineTo(w.x*CS+CS-5,w.y*CS+CS-5);
    ctx.moveTo(w.x*CS+CS-5,w.y*CS+5);ctx.lineTo(w.x*CS+5,w.y*CS+CS-5);
    ctx.stroke();
    ctx.restore();
  });

  // Jídlo
  foods.forEach(f=>{
    const p=0.8+0.2*Math.abs(Math.sin(now/200));
    const cx=f.x*CS+CS/2, cy=f.y*CS+CS/2;
    ctx.save();
    if(f.bonus){
      ctx.shadowColor='#fff'; ctx.shadowBlur=25;
      ctx.fillStyle='#ffffff';
      ctx.beginPath();ctx.arc(cx,cy,CS/2*0.65*p,0,Math.PI*2);ctx.fill();
      ctx.shadowBlur=0;
      ctx.fillStyle='#111';
      ctx.font='bold '+Math.round(CS*0.32)+'px sans-serif';
      ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText('+3',cx,cy);
    } else {
      ctx.shadowColor=f.c; ctx.shadowBlur=18;
      const grad=ctx.createRadialGradient(cx-CS*0.15,cy-CS*0.15,1,cx,cy,CS*0.5);
      grad.addColorStop(0,'#fff');
      grad.addColorStop(0.4,f.c);
      grad.addColorStop(1,f.c+'88');
      ctx.fillStyle=grad;
      ctx.beginPath();ctx.arc(cx,cy,CS/2*0.65*p,0,Math.PI*2);ctx.fill();
    }
    ctx.restore();
  });

  // Had
  snake.forEach((s,i)=>{
    const hue=(i*25)%360;
    const cx=s.x*CS+CS/2, cy=s.y*CS+CS/2;
    ctx.save();
    ctx.shadowBlur=14; ctx.shadowColor=`hsl(${hue},100%,55%)`;
    const grad=ctx.createRadialGradient(cx-CS*0.15,cy-CS*0.15,1,cx,cy,CS*0.6);
    grad.addColorStop(0,`hsl(${hue},100%,80%)`);
    grad.addColorStop(1,`hsl(${hue},100%,40%)`);
    ctx.fillStyle=grad;
    ctx.beginPath();
    ctx.roundRect(s.x*CS+2,s.y*CS+2,CS-4,CS-4,i===0?8:5);
    ctx.fill();
    if(i===0){
      ctx.shadowBlur=0;
      const ex=vx,ey=vy,px=-ey,py=ex;
      const e1x=cx+ex*CS*0.22+px*CS*0.18, e1y=cy+ey*CS*0.22+py*CS*0.18;
      const e2x=cx+ex*CS*0.22-px*CS*0.18, e2y=cy+ey*CS*0.22-py*CS*0.18;
      ctx.fillStyle='#fff';
      ctx.beginPath();ctx.arc(e1x,e1y,CS*0.13,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.arc(e2x,e2y,CS*0.13,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#111';
      ctx.beginPath();ctx.arc(e1x+ex*1.5,e1y+ey*1.5,CS*0.07,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.arc(e2x+ex*1.5,e2y+ey*1.5,CS*0.07,0,Math.PI*2);ctx.fill();
    }
    ctx.restore();
  });

  // Particles
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.x+=p.vx; p.y+=p.vy; p.vy+=0.2; p.life-=0.06;
    if(p.life<=0){particles.splice(i,1);continue;}
    ctx.save();
    ctx.globalAlpha=p.life;
    ctx.shadowBlur=8; ctx.shadowColor=p.color;
    ctx.fillStyle=p.color;
    ctx.beginPath();ctx.arc(p.x,p.y,3.5*p.life,0,Math.PI*2);ctx.fill();
    ctx.restore();
  }
}

document.addEventListener('keydown',e=>{
  if(e.key===' '||e.key==='Enter'){e.preventDefault();startGame();return;}
  const m={ArrowUp:[0,-1],ArrowDown:[0,1],ArrowLeft:[-1,0],ArrowRight:[1,0],
           w:[0,-1],s:[0,1],a:[-1,0],d:[1,0],W:[0,-1],S:[0,1],A:[-1,0],D:[1,0]};
  if(m[e.key]){e.preventDefault();tryDir(...m[e.key]);}
});

let tx,ty;
canvas.addEventListener('touchstart',e=>{tx=e.touches[0].clientX;ty=e.touches[0].clientY;},{passive:true});
canvas.addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-tx, dy=e.changedTouches[0].clientY-ty;
  if(Math.abs(dx)>Math.abs(dy)) tryDir(dx>0?1:-1,0);
  else tryDir(0,dy>0?1:-1);
},{passive:true});
</script>
</body>
</html>
